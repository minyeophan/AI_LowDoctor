/api/posts:
  get:
    summary: "게시글 목록 조회"
    description: "카테고리별 필터링, 검색, 정렬(최신순, 인기순, 댓글순) 기능을 제공합니다."
    tags:
      - Post
    parameters:
      - in: query
        name: category
        schema:
          type: string
        description: "카테고리 필터 (예: 부동산, 전체)"
      - in: query
        name: sort
        schema:
          type: string
          enum: [latest, popular, views, comments]
          default: latest
        description: "정렬 기준"
      - in: query
        name: keyword
        schema:
          type: string
        description: "제목 검색 키워드"
    responses:
      200:
        description: "조회 성공"
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PostResponse'

  post:
    summary: "게시글 작성"
    tags:
      - Post
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, content]
            properties:
              title:
                type: string
                maxLength: 60
              content:
                type: string
              category:
                type: string
                default: "부동산"
    responses:
      201:
        description: "작성 성공"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostResponse'

/api/posts/best:
  get:
    summary: "베스트 게시글 조회"
    description: "좋아요와 조회수가 가장 높은 게시글 하나를 반환합니다."
    tags:
      - Post
    responses:
      200:
        description: "성공"
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostResponse'

/api/posts/{id}:
  get:
    summary: "게시글 상세 조회"
    tags:
      - Post
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    responses:
      200:
        description: "조회 성공 (조회수 1 증가)"
  patch:
    summary: "게시글 수정"
    tags:
      - Post
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
              content:
                type: string
              category:
                type: string
    responses:
      200:
        description: "수정 성공"
  delete:
    summary: "게시글 삭제"
    tags:
      - Post
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    responses:
      200:
        description: "삭제 성공 (해당 댓글도 모두 삭제)"

/api/posts/{id}/like:
  post:
    summary: "게시글 좋아요 토글"
    tags:
      - Post
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    responses:
      200:
        description: "토글 결과 반환"

components:
  schemas:
    PostResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        category:
          type: string
        author:
          type: string
          description: "마스킹 처리된 이름 (예: 홍*동)"
        date:
          type: string
          example: "2024-05-20 14:30"
        views:
          type: integer
        comments:
          type: integer
        likes:
          type: integer