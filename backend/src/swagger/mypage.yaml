/api/mypage:
  get:
    summary: "마이페이지 보관함 목록 조회"
    description: "사용자의 계약서 목록을 '작성 중' 또는 '보관함' 카테고리별로 필터링하여 가져옵니다."
    tags:
      - MyPage
    parameters:
      - in: query
        name: category
        required: true
        schema:
          type: string
          enum: [draft, storage]
          default: draft
        description: "카테고리 구분 (draft: 작성 중, storage: 보관함)"
      - in: query
        name: sort
        schema:
          type: string
          enum: [recent, old, name]
          default: recent
        description: "정렬 기준 (recent: 최근순, old: 오래된순, name: 이름순)"
      - in: query
        name: contractType
        schema:
          type: string
        description: "계약 유형 필터 (예: 부동산, 전체)"
    responses:
      200:
        description: "성공적으로 목록을 불러왔습니다."
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: string
                  example: "작성 중"
                total:
                  type: integer
                  example: 1
                list:
                  type: array
                  items:
                    $ref: '#/components/schemas/MyPageItem'
      401:
        description: "인증되지 않은 사용자 (로그인 필요)"
      500:
        description: "서버 내부 에러"

components:
  schemas:
    MyPageItem:
      type: object
      properties:
        documentId:
          type: string
          description: "문서 고유 ID"
        contractType:
          type: string
          description: "계약 유형 (부동산 등)"
        title:
          type: string
          description: "파일명(계약서 제목)"
        updatedAt:
          type: string
          format: date
          description: "작성 중 카테고리일 때 표시되는 최종 수정일"
        uploadDate:
          type: string
          format: date
          description: "보관함 카테고리일 때 표시되는 업로드일"
        progress:
          type: integer
          description: "분석 진행률 (0~100)"
        statusText:
          type: string
          description: "분석 상태 텍스트 (분석 중, 분석 완료 등)"
        analysisStatus:
          type: string
          description: "보관함에서 사용하는 분석 상태 텍스트"