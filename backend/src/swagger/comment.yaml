/api/posts/{id}/comments:
  get:
    summary: "게시글의 댓글 목록 조회"
    tags:
      - Comment
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: "게시글 ID"
    responses:
      200:
        description: "조회 성공"
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CommentResponse'

  post:
    summary: "댓글 작성"
    tags:
      - Comment
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [content]
            properties:
              content:
                type: string
    responses:
      201:
        description: "작성 성공"

/api/comments/{commentId}/like:
  post:
    summary: "댓글 좋아요 토글"
    tags:
      - Comment
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: commentId
        required: true
        schema:
          type: string
    responses:
      200:
        description: "토글 결과 반환"

components:
  schemas:
    CommentResponse:
      type: object
      properties:
        id:
          type: string
        postId:
          type: string
        author:
          type: string
        content:
          type: string
        date:
          type: string
          example: "2024-05-20 15:00"
        likes:
          type: integer