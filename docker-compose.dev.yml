services:
    ai:
      build: ./AI
      volumes:
        - ./AI:/app
        - ai_venv:/app/.venv
      command: uvicorn ai_api:app --host 0.0.0.0 --port 8000 --reload
      ports:
        - "8000:8000"
      env_file:
        - ./AI/.env
      networks:
        - lawdoctor-network

    backend:
      build: ./backend
      volumes:
        - ./backend/src:/app/src
        - ./backend/.env:/app/.env
      command: npm start
      ports:
        - "3001:3001"
      env_file:
        - ./backend/.env
      environment:
        - AI_SERVER_URL=http://ai:8000
      depends_on:
        - ai
      networks:
        - lawdoctor-network

    frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile.dev
      volumes:
        - ./frontend:/app
        - frontend_node_modules:/app/node_modules
      command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
      ports:
        - "5173:5173"
      depends_on:
        - backend
      networks:
        - lawdoctor-network

networks:
  lawdoctor-network:
    driver: bridge

volumes:
  ai_venv:
  frontend_node_modules:
