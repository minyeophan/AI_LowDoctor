name: Build & Deploy to AWS EC2

on:
  push:
    branches: [ main ]

env:
  GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ── 1. 코드 가져오기
    - name: Checkout
      uses: actions/checkout@v4

    # ── 2. Docker Buildx 설정 (캐시 기능 활성화)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ── 3. GHCR 로그인
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # ── 4. AI 이미지 빌드 & Push
    - name: Build & Push AI image
      uses: docker/build-push-action@v5
      with:
        context: ./AI
        push: true
        tags: ${{ env.GHCR_IMAGE_PREFIX }}/lawdoctor-ai:latest
        cache-from: type=gha,scope=ai
        cache-to: type=gha,scope=ai,mode=max

    # ── 5. Backend 이미지 빌드 & Push
    - name: Build & Push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ env.GHCR_IMAGE_PREFIX }}/lawdoctor-backend:latest
        cache-from: type=gha,scope=backend
        cache-to: type=gha,scope=backend,mode=max

    # ── 6. Frontend 이미지 빌드 & Push
    - name: Build & Push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ env.GHCR_IMAGE_PREFIX }}/lawdoctor-frontend:latest
        cache-from: type=gha,scope=frontend
        cache-to: type=gha,scope=frontend,mode=max

    # ── 7. docker-compose.prod.yml → EC2 전송
    - name: Copy docker-compose.prod.yml to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.prod.yml"
        target: "/home/ubuntu/AI_LawDoctor"

    # ── 8. EC2 SSH 접속 → 배포
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/AI_LawDoctor

          docker pull ghcr.io/${{ secrets.GITHUB_REPOSITORY_OWNER }}/lawdoctor-ai:latest
          docker pull ghcr.io/${{ secrets.GITHUB_REPOSITORY_OWNER }}/lawdoctor-backend:latest
          docker pull ghcr.io/${{ secrets.GITHUB_REPOSITORY_OWNER }}/lawdoctor-frontend:latest

          GITHUB_REPOSITORY_OWNER=${{ secrets.GITHUB_REPOSITORY_OWNER }} \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

          docker image prune -f

          docker ps
